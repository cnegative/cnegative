name: Release Assets

on:
  release:
    types:
      - published
      - prereleased
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to upload assets to
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-upload:
    name: ${{ matrix.os }} Release Asset
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-15
          - windows-2022

    defaults:
      run:
        shell: bash

    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Clang and LLVM on Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm

      - name: Install Clang and LLVM on macOS
        if: runner.os == 'macOS'
        run: |
          brew install llvm
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"

      - name: Install Clang and LLVM on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install llvm --yes --no-progress
          "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Resolve release tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RELEASE_TAG=${{ inputs.tag }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=${{ github.event.release.tag_name }}" >> "$GITHUB_ENV"
          fi

      - name: Show tool versions
        run: |
          cmake --version
          clang --version
          if command -v llvm-as-18 >/dev/null 2>&1; then
            llvm-as-18 --version
          elif command -v llvm-as >/dev/null 2>&1; then
            llvm-as --version
          else
            echo "llvm-as not found; smoke tests will fall back to clang -c -x ir"
          fi

      - name: Ensure release exists
        run: gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY"

      - name: Configure
        run: cmake -S . -B out

      - name: Build
        run: cmake --build out --config Release

      - name: Test
        run: ctest --test-dir out --output-on-failure -C Release

      - name: Package compiler
        run: |
          BINARY_PATH=""
          for candidate in \
            out/build/cnegc \
            out/build/cnegc.exe \
            out/build/Release/cnegc \
            out/build/Release/cnegc.exe
          do
            if [ -f "$candidate" ]; then
              BINARY_PATH="$candidate"
              break
            fi
          done

          if [ -z "$BINARY_PATH" ]; then
            echo "could not find built cnegc binary"
            exit 1
          fi

          ARCH="$(uname -m)"
          OS_NAME="$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]')"
          PACKAGE_DIR="release/cnegc"
          ASSET_NAME="cnegc-${RELEASE_TAG}-${OS_NAME}-${ARCH}.zip"

          mkdir -p "$PACKAGE_DIR"
          cp "$BINARY_PATH" "$PACKAGE_DIR/"
          cp LICENSE "$PACKAGE_DIR/"
          cp README.md "$PACKAGE_DIR/"
          cp docs/how-to-run-and-build.md "$PACKAGE_DIR/"

          cmake -E tar cf "$ASSET_NAME" --format=zip release
          echo "ASSET_NAME=$ASSET_NAME" >> "$GITHUB_ENV"

      - name: Upload release asset
        run: gh release upload "$RELEASE_TAG" "$ASSET_NAME" --repo "$GITHUB_REPOSITORY" --clobber
